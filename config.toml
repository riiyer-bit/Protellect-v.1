def render_experiments_tab(
    protein_data: dict,
    clinvar_data: dict | None,
    ml_scores:    dict | None,
    assay_text:   str,
    papers:       list | None,
    gene_name:    str,
):
    st.markdown("#### 🧪 Further Experimentation & Therapy")
    st.markdown(
        "Detailed protocols, cost considerations, and mutation-level guidance for "
        "maximising experimental ROI.",
    )

    # ── Summary scorecard ────────────────────────────────────────────────────
    _render_strategy_scorecard(protein_data, clinvar_data, ml_scores)

    st.markdown("<hr class='divider'>", unsafe_allow_html=True)

    # ── Assay text interpretation ─────────────────────────────────────────────
    if assay_text and assay_text.strip():
        _render_assay_guidance(assay_text, clinvar_data, ml_scores)
        st.markdown("<hr class='divider'>", unsafe_allow_html=True)

    # ── Experiment catalogue ──────────────────────────────────────────────────
    st.markdown("#### 📋 Experiment Catalogue with Detailed Protocols")
    _render_cost_legend()

    for category, experiments in EXPERIMENT_CATALOGUE.items():
        st.markdown(f"### {category}")
        for exp_name, exp in experiments.items():
            _render_experiment_card(exp_name, exp, ml_scores, clinvar_data)

    st.markdown("<hr class='divider'>", unsafe_allow_html=True)

    # ── Decision flowchart ────────────────────────────────────────────────────
    _render_decision_flowchart(protein_data, ml_scores, clinvar_data)

    st.markdown("<hr class='divider'>", unsafe_allow_html=True)
    render_citations(papers or [], max_show=6)


# ─── Strategy scorecard ───────────────────────────────────────────────────────
def _render_strategy_scorecard(pdata, clinvar_data, ml_scores):
    st.markdown("##### 🎯 Experimental Strategy Scorecard")

    diseases      = UniProtClient.extract_diseases(pdata)
    summary       = (clinvar_data or {}).get("summary", {})
    top_vars      = (ml_scores or {}).get("top_variants", [])
    path_count    = summary.get("pathogenic_count", 0)
    protein_type  = _infer_protein_type(pdata)

    # Score components
    n_diseases = len(diseases)
    n_critical = sum(1 for v in top_vars if v.get("ml_rank") == "CRITICAL")
    n_high     = sum(1 for v in top_vars if v.get("ml_rank") == "HIGH")

    druggability = _estimate_druggability(pdata, protein_type)
    priority     = min(100, (n_critical * 15 + n_high * 8 + path_count * 3 +
                              n_diseases * 5 + druggability * 20))

    c1, c2, c3, c4 = st.columns(4)
    c1.markdown(
        f"<div class='metric-box'><div class='val' style='color:#ff2d55;'>{n_critical}</div>"
        f"<div class='lbl'>CRITICAL Variants</div></div>", unsafe_allow_html=True)
    c2.markdown(
        f"<div class='metric-box'><div class='val' style='color:#ff6b00;'>{n_high}</div>"
        f"<div class='lbl'>HIGH Variants</div></div>", unsafe_allow_html=True)
    c3.markdown(
        f"<div class='metric-box'><div class='val' style='color:#00c896;'>{druggability:.0%}</div>"
        f"<div class='lbl'>Druggability Est.</div></div>", unsafe_allow_html=True)
    c4.markdown(
        f"<div class='metric-box'><div class='val' style='color:#00d4ff;'>{priority}</div>"
        f"<div class='lbl'>Priority Score / 100</div></div>", unsafe_allow_html=True)

    # Recommendation
    if priority >= 70:
        rec = "⚡ **High experimental priority.** Multiple pathogenic variants with disease evidence. Recommend immediate functional validation (CRISPR knock-in, biochemical assays)."
        colour = "#ff2d55"
    elif priority >= 40:
        rec = "🟡 **Moderate priority.** Some evidence warrants further investigation. In silico stability prediction + reporter assay recommended before animal studies."
        colour = "#ffd60a"
    else:
        rec = "🟢 **Low priority.** Insufficient pathogenic evidence. ClinVar triage suggests this protein/variant set may not justify large-scale investment currently."
        colour = "#00c896"

    st.markdown(
        f"<div style='background:#0a1929;border-left:4px solid {colour};border-radius:0 8px 8px 0;"
        f"padding:1rem 1.5rem;margin-top:0.8rem;'>"
        f"<p style='color:#c9d8e8;margin:0;'>{rec}</p></div>",
        unsafe_allow_html=True,
    )


def _infer_protein_type(pdata: dict) -> str:
    kws = [kw.get("value","").lower() for kw in pdata.get("keywords",[])]
    if any("kinase" in k for k in kws):        return "kinase"
    if any("transcription" in k for k in kws): return "transcription_factor"
    if any("gpcr" in k or "g-protein" in k for k in kws): return "gpcr"
    if any("receptor" in k for k in kws):      return "receptor"
    if any("protease" in k for k in kws):      return "protease"
    return "general"


def _estimate_druggability(pdata: dict, ptype: str) -> float:
    """Rough druggability score 0–1."""
    scores = {
        "kinase": 0.90,
        "gpcr":   0.95,
        "receptor": 0.80,
        "protease": 0.75,
        "transcription_factor": 0.35,
        "general": 0.50,
    }
    return scores.get(ptype, 0.50)


# ─── Assay guidance ───────────────────────────────────────────────────────────
def _render_assay_guidance(assay_text: str, clinvar_data, ml_scores):
    st.markdown("##### 🧫 Assay-Specific Next Steps")
    text_lower = assay_text.lower()
    top_vars   = (ml_scores or {}).get("top_variants", [])

    recs = []
    if "western blot" in text_lower or "wb" in text_lower:
        recs.append(("Western Blot → Follow Up With",
                     "Quantify expression differences across multiple cell lines. "
                     "If expression change observed, proceed with ubiquitination assay and half-life measurement (CHX chase). "
                     "Validate with orthogonal proteomics (SILAC or TMT-MS)."))
    if "crispr" in text_lower or "knockout" in text_lower:
        recs.append(("CRISPR Knockout → Follow Up With",
                     "Rescue experiment: re-introduce WT and each variant to confirm specificity. "
                     "RNA-seq on KO vs WT to identify transcriptome perturbation. "
                     "If oncogene: assess if KO reduces tumour burden in xenograft."))
    if "flow cytometry" in text_lower or "facs" in text_lower:
        recs.append(("Flow Cytometry → Follow Up With",
                     "If apoptosis detected: western blot for caspase 3/7 cleavage, Bcl-2 family members. "
                     "If cell cycle arrest: add CDK inhibitor comparison. "
                     "Consider single-cell RNA-seq to resolve heterogeneous populations."))
    if "binding" in text_lower or "co-ip" in text_lower:
        recs.append(("Interaction Data → Follow Up With",
                     "Map binding interface using hydrogen-deuterium exchange MS (HDX-MS). "
                     "Structural determination (cryo-EM or X-ray) to visualise complex. "
                     "Design peptide / small-molecule disruptors of the interface."))
    if not recs:
        recs.append(("General Assay → Next Steps",
                     "Characterise dose–response relationships. Validate findings in ≥2 independent cell lines. "
                     "Integrate with ClinVar variant prioritisation for mechanistic hypotheses."))

    for title, body in recs:
        st.markdown(
            f"<div class='card'><h4>{title}</h4><p>{body}</p></div>",
            unsafe_allow_html=True,
        )


# ─── Cost legend ─────────────────────────────────────────────────────────────
def _render_cost_legend():
    cols = st.columns(len(COST_LEGEND))
    for (sym, (label, colour)), col in zip(COST_LEGEND.items(), cols):
        col.markdown(
            f"<div style='text-align:center;background:#0a1929;border:1px solid {colour};"
            f"border-radius:8px;padding:6px;'>"
            f"<div style='color:{colour};font-size:1.1rem;font-weight:700;'>{sym}</div>"
            f"<div style='color:#8ab4d4;font-size:0.75rem;'>{label}</div></div>",
            unsafe_allow_html=True,
        )
    st.markdown("<br>", unsafe_allow_html=True)


# ─── Experiment card ──────────────────────────────────────────────────────────
def _render_experiment_card(name: str, exp: dict, ml_scores, clinvar_data):
    cost_sym  = exp.get("cost", "$")
    cost_label, cost_colour = COST_LEGEND.get(cost_sym, ("—", "#636e72"))
    timeline  = exp.get("timeline","—")

    with st.expander(
        f"{name}  ·  Cost: {cost_sym} ({cost_label})  ·  ⏱ {timeline}",
        expanded=False,
    ):
        col_l, col_r = st.columns([2, 1])

        with col_l:
            st.markdown(f"**Purpose:** {exp.get('purpose','')}")
            st.markdown("**Protocol:**")
            for i, step in enumerate(exp.get("protocol", []), 1):
                st.markdown(f"{i}. {step}")
            st.markdown(f"**Expected Outcome:** {exp.get('outcome','—')}")

        with col_r:
            st.markdown(
                f"<div style='background:#0a1929;border:1px solid {cost_colour};"
                f"border-radius:10px;padding:1rem;'>"
                f"<p style='color:{cost_colour};font-weight:700;font-size:1.1rem;margin:0 0 4px;'>{cost_sym} {cost_label}</p>"
                f"<p style='color:#8ab4d4;font-size:0.82rem;margin:0 0 8px;'>⏱ {timeline}</p>"
                f"<hr style='border-color:#1e3a5f;margin:6px 0;'>"
                f"<p style='color:#00c896;font-size:0.82rem;margin:0 0 4px;'><b>✅ Focus on:</b></p>"
                f"<p style='color:#b2e4d0;font-size:0.8rem;margin:0 0 8px;'>{exp.get('focus','—')}</p>"
                f"<p style='color:#ff6b00;font-size:0.82rem;margin:0 0 4px;'><b>❌ Deprioritise:</b></p>"
                f"<p style='color:#ffd0b0;font-size:0.8rem;margin:0;'>{exp.get('neglect','—')}</p>"
                f"</div>",
                unsafe_allow_html=True,
            )


# ─── Decision flowchart ────────────────────────────────────────────────────────
def _render_decision_flowchart(pdata, ml_scores, clinvar_data):
    st.markdown("#### 🗺️ Experimental Decision Framework")
    st.caption("Follow this triage logic to minimise wasted resources.")

    top_vars   = (ml_scores or {}).get("top_variants", [])
    n_critical = sum(1 for v in top_vars if v.get("ml_rank") == "CRITICAL")
    n_high     = sum(1 for v in top_vars if v.get("ml_rank") == "HIGH")
    n_medium   = sum(1 for v in top_vars if v.get("ml_rank") == "MEDIUM")
    n_neutral  = sum(1 for v in top_vars if v.get("ml_rank") == "NEUTRAL")
    total      = len(top_vars) or 1

    labels  = ["CRITICAL", "HIGH", "MEDIUM", "NEUTRAL"]
    values  = [n_critical, n_high, n_medium, n_neutral]
    colours = ["#ff2d55", "#ff6b00", "#ffd60a", "#636e72"]

    fig = go.Figure(go.Funnel(
        y=labels, x=values,
        textinfo="value+percent initial",
        marker=dict(color=colours),
        textfont=dict(color="white", size=14),
    ))
    fig.update_layout(
        paper_bgcolor="#060e18", plot_bgcolor="#060e18",
        font_color="#8ab4d4",
        height=320,
        margin=dict(t=10, b=10, l=60, r=10),
        title=dict(text="Variant Triage Funnel", font_color="#00d4ff"),
    )
    st.plotly_chart(fig, use_container_width=True, config={"displayModeBar": False})

    # Decision table
    decisions = [
        ("CRITICAL", "#ff2d55", "Immediate functional validation (CRISPR knock-in, biochemical assay). Pursue in vivo if in vitro confirms pathogenicity."),
        ("HIGH",     "#ff6b00", "Functional assay + in silico stability. Advance to in vivo only if in vitro shows phenotype."),
        ("MEDIUM",   "#ffd60a", "In silico modelling + low-cost cell assay (reporter, viability). Hold before animal experiments."),
        ("NEUTRAL",  "#636e72", "Deprioritise. Monitor future ClinVar reclassifications. No wet-lab resources recommended currently."),
    ]
    for rank, col, rec in decisions:
        st.markdown(
            f"<div style='display:flex;align-items:flex-start;gap:12px;"
            f"background:#0a1929;border-left:4px solid {col};border-radius:0 8px 8px 0;"
            f"padding:10px 14px;margin:6px 0;'>"
            f"<span style='background:{col};color:{'#111' if rank=='MEDIUM' else '#fff'};"
            f"padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:700;"
            f"white-space:nowrap;margin-top:1px;'>{rank}</span>"
            f"<span style='color:#c9d8e8;font-size:0.87rem;'>{rec}</span>"
            f"</div>",
            unsafe_allow_html=True,
        )
